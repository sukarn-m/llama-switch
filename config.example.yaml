# llama-switch configuration template
# Copy to config.yaml and adjust for your machine.
# See AGENTS.md for field reference.

server:
  host: "127.0.0.1"
  port: 8080
  backend_port_start: 8201
  backend_port_end: 8299
  max_models: 2
  idle_timeout_minutes: 60
  health_timeout_seconds: 180
  sweep_interval_seconds: 15

backend:
  binary: "~/sources/llama.cpp-cuda/llama-server"
  env:
    LD_LIBRARY_PATH: "~/sources/llama.cpp-cuda:~/.local/lib/python3.14/site-packages/nvidia/nccl/lib:~/.local/lib/python3.14/site-packages/nvidia/cudnn/lib"
  common_args:
    - "--batch-size"
    - "2048"
    - "--ubatch-size"
    - "512"
    - "--flash-attn"
    - "on"
    - "--kv-unified"
    - "--cache-ram"
    - "0"
  workdir: "~"
  nvidia_smi: "nvidia-smi"

models:
  - id: example-model
    model: Example-Model-1.0
    path: "~/models/example-model.gguf"
    mmproj: "~/models/mmproj-F32.gguf"
    alias: example-model
    context_size: 0   # 0 = use llama-server/model default
    parallel: 2
    devices: ["CUDA0", "CUDA1"]
    tensor_split: "0.85,0.15"
    ctx_checkpoints: 4
    extra_args:
      - "--cache-type-k"
      - "q8_0"
      - "--cache-type-v"
      - "q8_0"
